name: Build Minecraft Spigot Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из вашего репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Java 25
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # 3. Скачиваем рабочую библиотеку (Paper API полностью совместим со Spigot)
    - name: Download Spigot-Compatible API
      run: |
        mkdir -p lib
        curl -L -o lib/spigot-api.jar "https://papermc.io"

    # 4. Компилируем код плагина
    - name: Compile Java Code
      run: |
        javac -encoding UTF-8 -cp "lib/spigot-api.jar" src/ru/yourname/egorbed/Main.java

    # 5. Упаковываем всё в готовый .jar файл
    - name: Build JAR Artifact
      run: |
        jar cfM EgorBed.jar plugin.yml -C src ru

    # 6. Сохраняем готовый файл для скачивания
    - name: Upload Finished Plugin
      uses: actions/upload-artifact@v4
      with:
        name: EgorBed-Plugin
        path: EgorBed.jar
